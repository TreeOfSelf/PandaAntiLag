name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/wrapper-validation-action@v2
      - uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
      - run: chmod +x ./gradlew
      - run: ./gradlew build
      - uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/libs/
